apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-notes-deployment
  labels:
    app: cloud-notes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-notes
  template:
    metadata:
      labels:
        app: cloud-notes
    spec:
      containers:
        - name: cloud-notes
          image: sujithkumar01/cloud_notes:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
